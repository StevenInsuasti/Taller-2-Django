<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Solicitud</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 40px; width: 100%; max-width: 600px; }
        h1 { color: #3730a3; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #6c757d; margin-bottom: 30px; font-size: 0.95rem; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 0.9rem; }
        input, textarea, select { width: 100%; padding: 10px 14px; border: 1px solid #ced4da; border-radius: 8px; font-size: 0.95rem; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #3730a3; box-shadow: 0 0 0 3px rgba(55,48,163,0.15); }
        .errorlist { color: #dc3545; font-size: 0.85rem; margin-top: 4px; list-style: none; }
        .btn { background: #3730a3; color: white; border: none; padding: 12px 30px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 10px; transition: background 0.2s; }
        .btn:hover { background: #1e1b6e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📝 Formulario de Solicitud</h1>
        <p class="subtitle">Complete el formulario para enviar su solicitud.</p>
        <form method="post" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <ul class="errorlist">
                            {% for error in field.errors %}<li>{{ error }}</li>{% endfor %}
                        </ul>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn">Enviar Solicitud</button>
        </form>
    </div>
</body>
</html>
