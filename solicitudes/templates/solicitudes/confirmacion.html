<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Enviada</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); padding: 50px 40px; width: 100%; max-width: 480px; text-align: center; }
        .icon { font-size: 4rem; margin-bottom: 20px; }
        h1 { color: #3730a3; margin-bottom: 12px; font-size: 1.8rem; }
        p { color: #6c757d; margin-bottom: 30px; line-height: 1.6; }
        .btn { display: inline-block; background: #3730a3; color: white; text-decoration: none; padding: 12px 30px; border-radius: 8px; font-size: 1rem; transition: background 0.2s; }
        .btn:hover { background: #1e1b6e; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✅</div>
        <h1>¡Solicitud Enviada!</h1>
        <p>Tu solicitud ha sido recibida y registrada exitosamente. Nos pondremos en contacto contigo pronto.</p>
        <a href="/solicitudes/" class="btn">Nueva Solicitud</a>
    </div>
</body>
</html>
